<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>레이어보드 — 이미지 콜라주 편집기</title>
<style>
  :root{
    --bg:#17191E; --panel:#1F2228; --surface:#2A2E36; --line:#3A3F49;
    --text:#E9EAEC; --muted:#9AA0AB; --accent:#E8B33C; --accent-ink:#1A1608;
    --danger:#E0604F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overflow:hidden;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",sans-serif;
    font-size:14px; display:flex; flex-direction:column;
  }
  header{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:10px 16px; border-bottom:1px solid var(--line); background:var(--panel);
    flex:0 0 auto;
  }
  header h1{font-size:15px; font-weight:700; margin:0; letter-spacing:-0.01em;}
  header h1 span{color:var(--accent);}
  header .spacer{flex:1;}
  button{
    font:inherit; color:var(--text); background:var(--surface);
    border:1px solid var(--line); border-radius:8px;
    padding:9px 14px; cursor:pointer; min-height:40px;
  }
  button:active{transform:translateY(1px);}
  button.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700;}
  button.danger{color:var(--danger); border-color:#5a3530;}
  button.small{padding:6px 10px; min-height:34px; font-size:13px;}
  button:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  main{flex:1; display:flex; min-height:0;}
  #stageWrap{
    flex:1; min-width:0; display:flex; align-items:center; justify-content:center;
    padding:20px; overflow:hidden; position:relative;
  }
  #stageCanvas{
    touch-action:none; user-select:none; -webkit-user-select:none;
    box-shadow:0 8px 40px rgba(0,0,0,.5), 0 0 0 1px var(--line);
    background:
      linear-gradient(45deg,#20232A 25%,transparent 25%,transparent 75%,#20232A 75%),
      linear-gradient(45deg,#20232A 25%,transparent 25%,transparent 75%,#20232A 75%),
      #1B1E24;
    background-size:24px 24px; background-position:0 0,12px 12px;
  }

  #panel{
    flex:0 0 300px; background:var(--panel); border-left:1px solid var(--line);
    overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px;
    display:flex; flex-direction:column; gap:16px;
  }
  section{display:flex; flex-direction:column; gap:9px;}
  section h2{
    font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--muted);
    text-transform:uppercase; margin:0; border-bottom:1px solid var(--line); padding-bottom:6px;
  }
  .row{display:flex; align-items:center; gap:8px;}
  .row label{flex:0 0 84px; color:var(--muted); font-size:13px;}
  .row .grow{flex:1; min-width:0;}
  input[type=text],input[type=number],select,textarea{
    font:inherit; color:var(--text); background:var(--surface);
    border:1px solid var(--line); border-radius:8px; padding:8px 10px; width:100%;
    min-height:40px;
  }
  textarea{resize:vertical; min-height:64px;}
  input[type=color]{
    width:44px; height:40px; padding:2px; border:1px solid var(--line);
    border-radius:8px; background:var(--surface); flex:0 0 auto;
  }
  input[type=range]{width:100%; accent-color:var(--accent);}
  input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent); outline-offset:1px;}
  .btnrow{display:flex; gap:8px; flex-wrap:wrap;}
  .btnrow button{flex:1;}
  .hint{color:var(--muted); font-size:12px; line-height:1.5; margin:0;}
  .toggle{display:flex; align-items:center; gap:8px; cursor:pointer;}
  .toggle input{width:20px; height:20px; accent-color:var(--accent);}
  #pageTabs{display:flex; gap:6px; flex-wrap:wrap;}
  #pageTabs button{flex:0 0 auto; min-width:44px;}
  #pageTabs button.active{border-color:var(--accent); color:var(--accent); font-weight:700;}
  #layerList{display:flex; flex-direction:column; gap:6px;}
  .layer-item{
    display:flex; align-items:center; gap:8px; padding:8px 10px;
    background:var(--surface); border:1px solid var(--line); border-radius:8px; cursor:pointer;
  }
  .layer-item.active{border-color:var(--accent);}
  .layer-item .name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px;}
  .layer-item .tag{font-size:11px; color:var(--muted); font-family:ui-monospace,monospace;}
  #empty{color:var(--muted); font-size:13px;}
  .dim{font-family:ui-monospace,monospace; font-size:12px; color:var(--muted);}
  #toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:10px 16px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:200;
    max-width:86vw; text-align:center;
  }
  #toast.show{opacity:1;}
  /* crop modal */
  #cropModal{
    position:fixed; inset:0; background:rgba(10,11,14,.92); z-index:100;
    display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:16px;
  }
  #cropModal.show{display:flex;}
  #cropCanvas{touch-action:none; box-shadow:0 8px 40px rgba(0,0,0,.6);}
  #cropModal .btnrow{width:min(480px,90vw);}
  @media (max-width:820px){
    main{flex-direction:column;}
    #panel{flex:0 0 46%; border-left:none; border-top:1px solid var(--line);}
    #stageWrap{padding:12px;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
</head>
<body>
<header>
  <h1>레이어<span>보드</span> <span class="dim">v14</span></h1>
  <span class="dim" id="canvasDim"></span>
  <div class="spacer"></div>
  <button id="previewBtn">미리 재생</button>
  <button id="exportVidBtn">영상 내보내기</button>
  <button class="primary" id="exportBtn">PNG 내보내기</button>
</header>

<main>
  <div id="stageWrap"><canvas id="stageCanvas"></canvas></div>

  <div id="panel">
    <section>
      <h2>페이지</h2>
      <div id="pageTabs"></div>
      <div class="btnrow">
        <button class="small" id="addPage">페이지 추가</button>
        <button class="small danger" id="delPage">현재 페이지 삭제</button>
      </div>
    </section>

    <section>
      <h2>추가</h2>
      <div class="btnrow">
        <button id="addImageBtn">사진 추가</button>
        <button id="addTextBtn">텍스트 추가</button>
      </div>
      <div class="btnrow">
        <button id="addVideoBtn">영상 추가</button>
        <button id="addFontBtn">글꼴 업로드</button>
      </div>
      <p class="hint">업로드한 글꼴은 이 페이지를 열어둔 동안만 유지됩니다. 새로고침하면 다시 업로드해야 해요.</p>
    </section>

    <section>
      <h2>캔버스 (모든 페이지 공통)</h2>
      <div class="row"><label>크기</label>
        <select id="sizePreset" class="grow">
          <option value="1080x1080">정사각 1080×1080</option>
          <option value="1080x1350">세로 4:5 1080×1350</option>
          <option value="1080x1920">세로 9:16 1080×1920</option>
          <option value="1920x1080">가로 16:9 1920×1080</option>
          <option value="custom">직접 입력</option>
        </select>
      </div>
      <div class="row" id="customSizeRow" style="display:none">
        <label>픽셀</label>
        <input type="number" id="customW" value="1080" min="100" max="8000" style="width:0" class="grow">
        <span>×</span>
        <input type="number" id="customH" value="1080" min="100" max="8000" style="width:0" class="grow">
        <button class="small" id="applyCustom">적용</button>
      </div>
      <div class="row"><label>배경 색</label>
        <input type="color" id="bgColor" value="#ffffff">
        <button class="small grow" id="bgImageBtn">배경 사진</button>
        <button class="small" id="bgImageClear">지움</button>
      </div>
      <div class="row"><label>내보내기 배율</label>
        <select id="exportScale" class="grow">
          <option value="1" selected>1× (설정한 크기 그대로)</option>
          <option value="2">2× (고해상도, 가로세로 2배)</option>
          <option value="3">3× (가로세로 3배)</option>
        </select>
      </div>
      <div class="row"><label>저장 크기</label><span class="dim" id="exportDim"></span></div>
      <div class="row"><label>내보내기 범위</label>
        <select id="exportRange" class="grow">
          <option value="current">현재 페이지만</option>
          <option value="all">전체 페이지</option>
        </select>
      </div>
    </section>

    <section id="propsSection" style="display:none">
      <h2>선택한 요소</h2>
      <div id="imageProps" style="display:none; flex-direction:column; gap:9px;">
        <div class="row"><label>크기</label><input type="range" id="imgScale" min="5" max="200" value="100"></div>
        <div class="row"><label>불투명도</label><input type="range" id="imgOpacity" min="10" max="100" value="100"></div>
        <div class="row"><label>테두리 색</label><input type="color" id="imgBorderColor" value="#111111"></div>
        <div class="row"><label>테두리 두께</label><input type="range" id="imgBorderW" min="0" max="40" value="0"><span class="dim" id="imgBorderWVal">0</span></div>
        <div class="row"><label>흐림</label><input type="range" id="adjBlur" min="0" max="100" value="0"><span class="dim" id="adjBlurVal">0</span></div>
        <div class="row"><label>밝기</label><input type="range" id="adjBright" min="-100" max="100" value="0"><span class="dim" id="adjBrightVal">0</span></div>
        <div class="row"><label>온도</label><input type="range" id="adjTemp" min="-100" max="100" value="0"><span class="dim" id="adjTempVal">0</span></div>
        <div class="row"><label>색조</label><input type="range" id="adjTint" min="-100" max="100" value="0"><span class="dim" id="adjTintVal">0</span></div>
        <div class="row"><label>채도</label><input type="range" id="adjSat" min="-100" max="100" value="0"><span class="dim" id="adjSatVal">0</span></div>
        <div class="row" id="trimRow" style="display:none">
          <label>구간(초)</label>
          <input type="number" id="trimStart" min="0" step="0.1" style="width:0" class="grow">
          <span>~</span>
          <input type="number" id="trimEnd" min="0" step="0.1" style="width:0" class="grow">
        </div>
        <div class="row" id="audioRow" style="display:none">
          <label class="toggle grow"><input type="checkbox" id="vidAudio"> 이 영상의 소리 사용 (1개만)</label>
        </div>
        <div class="btnrow"><button class="small" id="cropBtn">자르기</button><button class="small" id="cropReset">자르기 해제</button></div>
      </div>
      <div id="textProps" style="display:none; flex-direction:column; gap:9px;">
        <textarea id="tContent" placeholder="텍스트 내용"></textarea>
        <div class="row"><label>글꼴</label><select id="tFont" class="grow"></select></div>
        <div class="row"><label>크기</label><input type="range" id="tSize" min="10" max="240" value="48"><span class="dim" id="tSizeVal">48</span></div>
        <div class="row"><label>글자 색</label><input type="color" id="tColor" value="#111111">
          <label class="toggle grow"><input type="checkbox" id="tBold" checked> 굵게</label>
        </div>
        <div class="row"><label>글자 테두리 색</label><input type="color" id="tStrokeColor" value="#ffffff"></div>
        <div class="row"><label>글자 테두리 두께</label><input type="range" id="tStrokeW" min="0" max="20" value="0"><span class="dim" id="tStrokeWVal">0</span></div>
        <label class="toggle"><input type="checkbox" id="tBgOn"> 텍스트 배경(직사각형)</label>
        <div id="tBgProps" style="display:none; flex-direction:column; gap:9px;">
          <div class="row"><label>배경 색</label><input type="color" id="tBgColor" value="#ffffff"></div>
          <div class="row"><label>테두리 색</label><input type="color" id="tBorderColor" value="#111111"></div>
          <div class="row"><label>테두리 두께</label><input type="range" id="tBorderW" min="0" max="20" value="2"><span class="dim" id="tBorderWVal">2</span></div>
          <div class="row"><label>안쪽 여백</label><input type="range" id="tPad" min="0" max="80" value="16"><span class="dim" id="tPadVal">16</span></div>
        </div>
      </div>
      <div class="btnrow">
        <button class="small" id="layerUp">한 칸 위로</button>
        <button class="small" id="layerDown">한 칸 아래로</button>
      </div>
      <div class="btnrow">
        <button class="small" id="dupEl">복제</button>
        <button class="small danger" id="delEl">삭제</button>
      </div>
    </section>

    <section>
      <h2>레이어 (위쪽이 앞)</h2>
      <div id="layerList"></div>
      <p id="empty" class="hint">아직 요소가 없습니다. 사진이나 텍스트를 추가해 보세요.</p>
    </section>
  </div>
</main>

<div id="cropModal">
  <canvas id="cropCanvas"></canvas>
  <div class="btnrow">
    <button id="cropCancel">취소</button>
    <button id="cropFull">전체 선택</button>
    <button class="primary" id="cropApply">적용</button>
  </div>
  <p class="hint">사각형 안쪽을 끌면 이동, 모서리 점을 끌면 크기 조절이 됩니다.</p>
</div>

<input type="file" id="fileImage" accept="image/*" multiple hidden>
<input type="file" id="fileVideo" accept="video/*" hidden>
<input type="file" id="fileBg" accept="image/*" hidden>
<input type="file" id="fileFont" accept=".ttf,.otf,.woff,.woff2" hidden>
<div id="toast"></div>

<script>
(function(){
'use strict';
/* ---------- state ---------- */
let canvasW = 1080, canvasH = 1080;
let idSeq = 1, pageSeq = 1;
function newPage(){ return {id:pageSeq++, bgColor:'#ffffff', bgImage:null, elements:[]}; }
let pages = [newPage()];
let cur = 0;                       // current page index
let selectedId = null;
let viewScale = 1;
const dpr = Math.min(window.devicePixelRatio||1, 3);
const uploadedFonts = [];
const SYSTEM_FONTS = [
  ['-apple-system, "Apple SD Gothic Neo", sans-serif','기본 고딕(시스템)'],
  ['"Apple SD Gothic Neo", sans-serif','애플 SD 고딕'],
  ['serif','명조(시스템 세리프)'],
  ['ui-monospace, monospace','고정폭']
];

const $ = s => document.querySelector(s);
const stage = $('#stageCanvas'), stageWrap = $('#stageWrap');
const sctx = stage.getContext('2d');
const mctx = document.createElement('canvas').getContext('2d'); // 측정 전용

function page(){ return pages[cur]; }
function sel(){ return page().elements.find(e=>e.id===selectedId) || null; }
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._h); toast._h = setTimeout(()=>t.classList.remove('show'), 3000);
}

/* ==========================================================
   공유 렌더 코드: 편집 화면과 내보내기가 동일한 함수를 사용
   ========================================================== */
function fontString(el, s){
  return (el.bold ? '700 ' : '400 ') + (el.fontSize*s) + 'px ' + el.font;
}
function textBox(el){ // scale 1 기준 상자 크기
  mctx.font = fontString(el, 1);
  const lines = el.text.split('\n');
  const fs = el.fontSize, lh = Math.round(fs*1.3);
  let maxW = 0;
  lines.forEach(l=>{ maxW = Math.max(maxW, mctx.measureText(l).width); });
  const extra = el.bgOn ? (el.pad + el.borderW)*2 : 0;
  return { w: maxW + extra, h: lines.length*lh + extra, lh, fs };
}
/* 잉크 측정: 보이지 않는 캔버스에 실제로 그려서 픽셀 상하한을 스캔.
   엔진의 측정 API에 의존하지 않으므로 브라우저별 편차가 없음. */
const inkCache = new Map();
const inkCanvas = document.createElement('canvas');
const inkCtx = inkCanvas.getContext('2d', {willReadFrequently:true});
function scanInk(line, font, bold){
  const FS = 100, BASE = 150, H = 300;
  inkCtx.font = (bold?'700 ':'400 ') + FS + 'px ' + font;
  const w = Math.min(4000, Math.ceil(inkCtx.measureText(line).width) + 40);
  if(w <= 40) return null;
  inkCanvas.width = w; inkCanvas.height = H;
  inkCtx.font = (bold?'700 ':'400 ') + FS + 'px ' + font; // 캔버스 리사이즈 후 재설정 필요
  inkCtx.textBaseline = 'alphabetic';
  inkCtx.fillStyle = '#000';
  inkCtx.fillText(line, 20, BASE);
  let data;
  try{ data = inkCtx.getImageData(0, 0, w, H).data; }
  catch(e){ return null; }
  let top = -1, bottom = -1;
  for(let y=0; y<H && top<0; y++){
    for(let x=0; x<w; x++){ if(data[(y*w+x)*4+3] > 16){ top = y; break; } }
  }
  if(top < 0) return null;
  for(let y=H-1; y>=0 && bottom<0; y--){
    for(let x=0; x<w; x++){ if(data[(y*w+x)*4+3] > 16){ bottom = y; break; } }
  }
  return { asc:(BASE-top)/FS, desc:(bottom-BASE)/FS };
}
function inkMetrics(el){
  const lines = el.text.split('\n');
  let asc = 0, desc = 0, found = false;
  lines.forEach(l=>{
    if(!l.trim()) return;
    const key = (el.bold?'B|':'N|') + el.font + '|' + l;
    let m = inkCache.get(key);
    if(m === undefined){
      m = scanInk(l, el.font, el.bold);
      inkCache.set(key, m);
    }
    if(m){ asc = Math.max(asc, m.asc); desc = Math.max(desc, m.desc); found = true; }
  });
  if(!found){ asc = 0.72; desc = 0.05; } // 스캔 불가 시 한글 일반값 근사
  return { asc, desc };
}
function drawTextEl(ctx, el, s){
  ctx.font = fontString(el, s);
  ctx.textBaseline = 'alphabetic'; // 측정과 그리기의 원점을 반드시 동일하게 유지
  const lines = el.text.split('\n');
  const fs = el.fontSize*s, lh = Math.round(el.fontSize*1.3)*s;
  const pad = el.pad*s, bw = el.borderW*s;
  let maxW = 0;
  lines.forEach(l=>{ maxW = Math.max(maxW, ctx.measureText(l).width); });
  const extra = el.bgOn ? (pad+bw)*2 : 0;
  const boxW = maxW + extra, boxH = lines.length*lh + extra;
  const x = el.x*s, y = el.y*s;
  if(el.bgOn){
    ctx.fillStyle = el.bgColor;
    ctx.fillRect(x, y, boxW, boxH);
    if(bw>0){
      ctx.strokeStyle = el.borderColor; ctx.lineWidth = bw;
      ctx.strokeRect(x+bw/2, y+bw/2, boxW-bw, boxH-bw);
    }
  }
  ctx.fillStyle = el.color;
  const off = el.bgOn ? pad+bw : 0;
  // 픽셀 스캔으로 잰 실제 잉크 비율을 현재 글자 크기에 곱해 사용
  const ink = inkMetrics(el);
  const asc = ink.asc*fs, desc = ink.desc*fs;
  ctx.textBaseline = 'alphabetic';
  const sw = (el.strokeW||0)*s;
  lines.forEach((l,i)=>{
    const slotTop = y + off + i*lh;
    const by = slotTop + (lh + asc - desc)/2;
    if(sw > 0){
      ctx.lineJoin = 'round'; ctx.miterLimit = 2;
      ctx.strokeStyle = el.strokeColor || '#ffffff';
      ctx.lineWidth = sw*2; // 절반은 글자 안쪽에 겹치므로, 바깥으로 보이는 두께가 설정값이 되도록 2배
      ctx.strokeText(l, x+off, by);
    }
    ctx.fillText(l, x+off, by);
  });
}
function imgDrawSize(el){ // scale 1 기준 표시 크기
  const cw = el.crop ? el.crop.cw : el.w;
  const ch = el.crop ? el.crop.ch : el.h;
  return { w: cw*el.scale, h: ch*el.scale };
}
/* 캔버스 2D 필터 지원 감지 (사파리는 지원이 늦었던 이력이 있어 직접 확인) */
const FILTER_OK = (()=>{ // '지원한다는 응답'이 아니라 실제 렌더 결과를 픽셀로 검증
  try{
    const c=document.createElement('canvas'); c.width=4; c.height=4;
    const t=c.getContext('2d');
    t.filter='brightness(50%)';
    if(t.filter!=='brightness(50%)') return false;
    t.fillStyle='#ffffff'; t.fillRect(0,0,4,4);
    return t.getImageData(0,0,1,1).data[0] < 250;
  }catch(e){ return false; }
})();
const blurTmp = document.createElement('canvas');
const blurCtx = blurTmp.getContext('2d');
const blurTmp2 = document.createElement('canvas');
const blurCtx2 = blurTmp2.getContext('2d');
const blurTmp3 = document.createElement('canvas');
const blurCtx3 = blurTmp3.getContext('2d');
function smoothOn(c){ c.imageSmoothingEnabled = true; try{ c.imageSmoothingQuality = 'high'; }catch(e){} }
const ADJ_DEFAULT = {blur:0, bright:0, temp:0, tint:0, sat:0};
function adj(el){ return el.adjust || ADJ_DEFAULT; }
function drawImageEl(ctx, el, s){
  const d = imgDrawSize(el);
  const a = adj(el);
  const x = el.x*s, y = el.y*s, dw = d.w*s, dh = d.h*s;
  const cx = el.crop?el.crop.cx:0, cy = el.crop?el.crop.cy:0;
  const cw = el.crop?el.crop.cw:el.w, ch = el.crop?el.crop.ch:el.h;
  ctx.globalAlpha = el.opacity;
  ctx.drawImage(el.img, cx, cy, cw, ch, x, y, dw, dh);
  /* 흐림: 원본과 흐린 사본의 비율 섞기 (0=원본, 중간=글로우, 100=완전 흐림) */
  if(a.blur>0){
    const cap = el.type==='video' ? 1440 : 2560; // 영상은 매 프레임 처리라 성능 고려
    const g = Math.min(1, cap/Math.max(dw, dh));
    const gw = Math.max(2, Math.round(dw*g)), gh = Math.max(2, Math.round(dh*g));
    const radius = Math.max(1, a.blur/100 * 0.025 * Math.max(gw, gh)); // 최대 흐림 반경: 긴 변의 2.5%
    if(FILTER_OK){
      blurTmp.width = gw; blurTmp.height = gh;
      smoothOn(blurCtx);
      blurCtx.filter = 'blur('+radius+'px)';
      blurCtx.drawImage(el.img, cx, cy, cw, ch, 0, 0, gw, gh);
      blurCtx.filter = 'none';
    }else{
      /* 피라미드 흐림: 절반씩 n단계 축소 후 절반씩 확대. 단번 확대의 계단 현상을 방지 */
      const n = Math.max(1, Math.min(6, Math.round(Math.log2(Math.max(2, radius/1.2)))));
      let curC = blurTmp2, curX = blurCtx2, altC = blurTmp3, altX = blurCtx3;
      let w = gw, h = gh;
      curC.width = w; curC.height = h; smoothOn(curX);
      curX.drawImage(el.img, cx, cy, cw, ch, 0, 0, w, h);
      const sizes = [];
      for(let i=0;i<n;i++){
        sizes.push([w,h]);
        const nw = Math.max(2, Math.round(w/2)), nh = Math.max(2, Math.round(h/2));
        altC.width = nw; altC.height = nh; smoothOn(altX);
        altX.drawImage(curC, 0, 0, w, h, 0, 0, nw, nh);
        [curC,curX,altC,altX] = [altC,altX,curC,curX];
        w = nw; h = nh;
      }
      for(let i=sizes.length-1;i>=0;i--){
        const [nw,nh] = sizes[i];
        altC.width = nw; altC.height = nh; smoothOn(altX);
        altX.drawImage(curC, 0, 0, w, h, 0, 0, nw, nh);
        [curC,curX,altC,altX] = [altC,altX,curC,curX];
        w = nw; h = nh;
      }
      blurTmp.width = gw; blurTmp.height = gh; smoothOn(blurCtx);
      blurCtx.drawImage(curC, 0, 0, w, h, 0, 0, gw, gh);
    }
    ctx.globalAlpha = el.opacity * (a.blur/100);
    smoothOn(ctx);
    ctx.drawImage(blurTmp, 0, 0, gw, gh, x, y, dw, dh);
    ctx.globalAlpha = el.opacity;
  }
  /* 공통 색 겹치기 도우미 */
  function overlay(color, mode, alpha){
    if(alpha<=0) return;
    ctx.save();
    ctx.globalAlpha = el.opacity * Math.min(1, alpha);
    ctx.globalCompositeOperation = mode;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, dw, dh);
    ctx.restore();
  }
  /* 밝기 +: 자기 자신을 덧셈 합성으로 얹어 픽셀값을 비례 증폭 (뿌예지지 않는 진짜 밝히기) */
  if(a.bright>0){
    ctx.save();
    ctx.globalAlpha = el.opacity * (a.bright/100*0.8);
    ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(ctx.canvas, x, y, dw, dh, x, y, dw, dh);
    ctx.restore();
  }else if(a.bright<0){
    overlay('#000000', 'multiply', -a.bright/100*0.7);
  }
  /* 온도: 곱하기 방식. 최대 강도 0.5로 제한 */
  if(a.temp>0) overlay('rgb(255,210,140)', 'multiply', a.temp/100*0.5);
  else if(a.temp<0) overlay('rgb(165,200,255)', 'multiply', -a.temp/100*0.5);
  /* 색조: 자홍 <-> 녹색. 최대 강도 0.5로 제한 */
  if(a.tint>0) overlay('rgb(255,175,235)', 'multiply', a.tint/100*0.5);
  else if(a.tint<0) overlay('rgb(210,255,185)', 'multiply', -a.tint/100*0.5);
  /* 채도: saturation 블렌드. 최대 강도 0.7로 제한 */
  if(a.sat<0) overlay('#808080', 'saturation', -a.sat/100*0.7);
  else if(a.sat>0) overlay('#ff0000', 'saturation', a.sat/100*0.7);
  if(el.borderW > 0){
    const bw = el.borderW*s;
    ctx.strokeStyle = el.borderColor; ctx.lineWidth = bw;
    ctx.strokeRect(x+bw/2, y+bw/2, dw-bw, dh-bw);
  }
  ctx.globalAlpha = 1;
}
function renderScene(ctx, pg, s){
  ctx.fillStyle = pg.bgColor;
  ctx.fillRect(0, 0, canvasW*s, canvasH*s);
  if(pg.bgImage){
    const iw = pg.bgImage.naturalWidth, ih = pg.bgImage.naturalHeight;
    const cover = Math.max(canvasW*s/iw, canvasH*s/ih);
    const dw = iw*cover, dh = ih*cover;
    ctx.drawImage(pg.bgImage, (canvasW*s-dw)/2, (canvasH*s-dh)/2, dw, dh);
  }
  pg.elements.forEach(el=>{
    if(el.type==='text') drawTextEl(ctx, el, s);
    else drawImageEl(ctx, el, s);
  });
}

/* ---------- 편집 화면 그리기 ---------- */
function elBox(el){ // scale 1 기준 히트 박스
  if(el.type!=='text'){ const d=imgDrawSize(el); return {x:el.x, y:el.y, w:d.w, h:d.h}; }
  const b = textBox(el); return {x:el.x, y:el.y, w:b.w, h:b.h};
}
function redraw(){
  const S = viewScale*dpr;
  stage.width = Math.round(canvasW*S);
  stage.height = Math.round(canvasH*S);
  stage.style.width = (canvasW*viewScale)+'px';
  stage.style.height = (canvasH*viewScale)+'px';
  renderScene(sctx, page(), S);
  const el = sel();
  if(el){
    const b = elBox(el);
    sctx.save();
    sctx.strokeStyle = '#E8B33C'; sctx.lineWidth = 2*dpr;
    sctx.setLineDash([6*dpr, 5*dpr]);
    sctx.strokeRect(b.x*S-2*dpr, b.y*S-2*dpr, b.w*S+4*dpr, b.h*S+4*dpr);
    sctx.setLineDash([]);
    const hx = (b.x+b.w)*S, hy = (b.y+b.h)*S;
    sctx.beginPath(); sctx.arc(hx, hy, 11*dpr, 0, Math.PI*2);
    sctx.fillStyle = '#E8B33C'; sctx.fill();
    sctx.lineWidth = 2.5*dpr; sctx.strokeStyle = '#1A1608'; sctx.stroke();
    sctx.restore();
  }
}
function fitStage(){
  const pad = 24;
  const availW = stageWrap.clientWidth - pad, availH = stageWrap.clientHeight - pad;
  viewScale = Math.min(availW/canvasW, availH/canvasH, 1);
  if(viewScale<=0 || !isFinite(viewScale)) viewScale = 0.1;
  $('#canvasDim').textContent = canvasW+'×'+canvasH+' · '+(cur+1)+'/'+pages.length+'페이지';
  updateExportDim();
  redraw();
}
function updateExportDim(){
  const s = +$('#exportScale').value;
  $('#exportDim').textContent = (canvasW*s)+'×'+(canvasH*s)+' px';
}
$('#exportScale').addEventListener('change', updateExportDim);
window.addEventListener('resize', fitStage);
function renderAll(){ fitStage(); renderPageTabs(); renderLayerList(); renderProps(); }

/* ---------- 포인터: 이동/크기 조절 ---------- */
let drag = null;
function stagePos(ev){
  const r = stage.getBoundingClientRect();
  return { x:(ev.clientX-r.left)/viewScale, y:(ev.clientY-r.top)/viewScale };
}
stage.addEventListener('pointerdown', ev=>{
  const p = stagePos(ev);
  const el = sel();
  const grip = 18/viewScale;
  if(el){
    const b = elBox(el);
    if(Math.hypot(p.x-(b.x+b.w), p.y-(b.y+b.h)) < grip){
      drag = {mode:'resize', el, sx:p.x, sy:p.y,
              scale:el.scale, fontSize:el.fontSize, bw:b.w};
      stage.setPointerCapture(ev.pointerId); ev.preventDefault(); return;
    }
  }
  const list = page().elements;
  for(let i=list.length-1; i>=0; i--){
    const b = elBox(list[i]);
    if(p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h){
      selectedId = list[i].id;
      drag = {mode:'move', el:list[i], sx:p.x, sy:p.y, ox:list[i].x, oy:list[i].y};
      stage.setPointerCapture(ev.pointerId);
      renderLayerList(); renderProps(); redraw();
      ev.preventDefault(); return;
    }
  }
  selectedId = null; renderLayerList(); renderProps(); redraw();
});
stage.addEventListener('pointermove', ev=>{
  if(!drag) return;
  const p = stagePos(ev);
  const dx = p.x-drag.sx, dy = p.y-drag.sy;
  const el = drag.el;
  if(drag.mode==='move'){ el.x = drag.ox+dx; el.y = drag.oy+dy; }
  else{
    if(el.type!=='text'){
      const cw = el.crop ? el.crop.cw : el.w;
      el.scale = Math.max(30, drag.bw+dx)/cw;
    }else{
      const ratio = Math.max(0.1, (drag.bw+dx)/drag.bw);
      el.fontSize = Math.max(10, Math.min(400, Math.round(drag.fontSize*ratio)));
    }
  }
  redraw();
  if(drag.mode==='resize') renderProps();
});
const endDrag = ()=>{ drag=null; };
stage.addEventListener('pointerup', endDrag);
stage.addEventListener('pointercancel', endDrag);

/* ---------- 페이지 ---------- */
function renderPageTabs(){
  const box = $('#pageTabs'); box.innerHTML='';
  pages.forEach((pg,i)=>{
    const b = document.createElement('button');
    b.className = 'small'+(i===cur?' active':'');
    b.textContent = (i+1);
    b.addEventListener('click', ()=>{ stopPreview(); cur=i; selectedId=null; renderAll(); });
    box.appendChild(b);
  });
}
$('#addPage').addEventListener('click', ()=>{
  pages.splice(cur+1, 0, newPage());
  cur = cur+1; selectedId=null; renderAll();
});
$('#delPage').addEventListener('click', ()=>{
  if(pages.length<=1){ toast('마지막 페이지는 삭제할 수 없습니다.'); return; }
  pages.splice(cur,1); cur = Math.min(cur, pages.length-1); selectedId=null; renderAll();
});

/* ---------- 레이어 목록 ---------- */
function renderLayerList(){
  const list = $('#layerList'); list.innerHTML='';
  const els = page().elements;
  $('#empty').style.display = els.length ? 'none':'block';
  [...els].reverse().forEach(el=>{
    const item = document.createElement('div');
    item.className='layer-item'+(el.id===selectedId?' active':'');
    const tag = document.createElement('span'); tag.className='tag';
    tag.textContent = el.type==='image'?'IMG':(el.type==='video'?'VID':'TXT');
    const name = document.createElement('span'); name.className='name';
    name.textContent = el.type==='text' ? (el.text.split('\n')[0]||'텍스트') : (el.name||(el.type==='video'?'영상':'사진'));
    item.appendChild(tag); item.appendChild(name);
    item.addEventListener('click', ()=>{ selectedId=el.id; renderLayerList(); renderProps(); redraw(); });
    list.appendChild(item);
  });
}

/* ---------- 속성 패널 ---------- */
function renderProps(){
  const el = sel();
  $('#propsSection').style.display = el ? 'flex':'none';
  if(!el) return;
  $('#imageProps').style.display = el.type!=='text' ? 'flex':'none';
  $('#textProps').style.display  = el.type==='text' ? 'flex':'none';
  if(el.type!=='text'){
    $('#audioRow').style.display = el.type==='video' ? 'flex':'none';
    $('#trimRow').style.display = el.type==='video' ? 'flex':'none';
    $('#vidAudio').checked = !!el.useAudio;
    if(el.type==='video'){
      const d = el.img.duration||0;
      if(el.trimEnd==null || el.trimEnd===0) el.trimEnd = d;
      $('#trimStart').max = d.toFixed(1); $('#trimEnd').max = d.toFixed(1);
      $('#trimStart').value = (el.trimStart||0).toFixed(1);
      $('#trimEnd').value = (el.trimEnd||d).toFixed(1);
    }
    $('#imgScale').value = Math.max(5, Math.min(200, Math.round(el.scale*100)));
    $('#imgOpacity').value = Math.round(el.opacity*100);
    $('#imgBorderColor').value = el.borderColor || '#111111';
    $('#imgBorderW').value = el.borderW || 0;
    $('#imgBorderWVal').textContent = el.borderW || 0;
    const a = adj(el);
    $('#adjBlur').value=a.blur; $('#adjBlurVal').textContent=a.blur;
    $('#adjBright').value=a.bright; $('#adjBrightVal').textContent=a.bright;
    $('#adjTemp').value=a.temp; $('#adjTempVal').textContent=a.temp;
    $('#adjTint').value=a.tint; $('#adjTintVal').textContent=a.tint;
    $('#adjSat').value=a.sat; $('#adjSatVal').textContent=a.sat;
  }else{
    $('#tContent').value = el.text;
    $('#tSize').value = el.fontSize; $('#tSizeVal').textContent = el.fontSize;
    $('#tColor').value = el.color; $('#tBold').checked = el.bold;
    $('#tStrokeColor').value = el.strokeColor || '#ffffff';
    $('#tStrokeW').value = el.strokeW || 0;
    $('#tStrokeWVal').textContent = el.strokeW || 0;
    rebuildFontSelect(el.font);
    $('#tBgOn').checked = el.bgOn;
    $('#tBgProps').style.display = el.bgOn ? 'flex':'none';
    $('#tBgColor').value = el.bgColor; $('#tBorderColor').value = el.borderColor;
    $('#tBorderW').value = el.borderW; $('#tBorderWVal').textContent = el.borderW;
    $('#tPad').value = el.pad; $('#tPadVal').textContent = el.pad;
  }
}
function rebuildFontSelect(current){
  const s = $('#tFont'); s.innerHTML='';
  SYSTEM_FONTS.forEach(([v,label])=>{
    const o=document.createElement('option'); o.value=v; o.textContent=label; s.appendChild(o);
  });
  uploadedFonts.forEach(f=>{
    const o=document.createElement('option'); o.value='"'+f+'"'; o.textContent=f+' (업로드)'; s.appendChild(o);
  });
  s.value = current;
  if(s.value !== current){ const o=document.createElement('option'); o.value=current; o.textContent=current; s.appendChild(o); s.value=current; }
}

/* ---------- 요소 추가 ---------- */
function loadImageFile(file){
  return new Promise((res,rej)=>{
    const reader = new FileReader();
    reader.onerror = ()=>rej(new Error('파일을 읽지 못했습니다: '+file.name));
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>res(img);
      img.onerror = ()=>rej(new Error('이 형식을 표시할 수 없습니다: '+file.name+' ('+(file.type||'형식 불명')+'). 사진 앱에서 JPEG로 복제해 시도해 보세요.'));
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
$('#addImageBtn').addEventListener('click', ()=> $('#fileImage').click());
$('#fileImage').addEventListener('change', async ev=>{
  for(const f of ev.target.files){
    try{
      const img = await loadImageFile(f);
      const fit = Math.min(canvasW*0.6/img.naturalWidth, canvasH*0.6/img.naturalHeight, 1);
      const el = {
        id:idSeq++, type:'image', img, name:f.name,
        w:img.naturalWidth, h:img.naturalHeight, scale:fit, crop:null,
        borderColor:'#111111', borderW:0,
        adjust:{blur:0,bright:0,temp:0,tint:0,sat:0},
        x:canvasW*0.1 + page().elements.length*20, y:canvasH*0.1 + page().elements.length*20, opacity:1
      };
      page().elements.push(el); selectedId = el.id;
    }catch(e){ toast(e.message); }
  }
  ev.target.value=''; renderAll();
});
$('#addTextBtn').addEventListener('click', ()=>{
  const el = {
    id:idSeq++, type:'text', text:'텍스트를 입력하세요',
    font:SYSTEM_FONTS[0][0], fontSize:64, color:'#111111', bold:true,
    strokeColor:'#ffffff', strokeW:0,
    bgOn:false, bgColor:'#ffffff', borderColor:'#111111', borderW:2, pad:16,
    x:canvasW*0.12, y:canvasH*0.12
  };
  page().elements.push(el); selectedId = el.id; renderAll();
});

/* ---------- 글꼴 ---------- */
$('#addFontBtn').addEventListener('click', ()=> $('#fileFont').click());
$('#fileFont').addEventListener('change', async ev=>{
  const f = ev.target.files[0]; if(!f) return;
  const name = f.name.replace(/\.(ttf|otf|woff2?|TTF|OTF)$/,'');
  try{
    const buf = await f.arrayBuffer();
    const face = new FontFace(name, buf);
    await face.load();
    document.fonts.add(face);
    uploadedFonts.push(name);
    const el = sel();
    if(el && el.type==='text'){ el.font = '"'+name+'"'; }
    toast('글꼴 "'+name+'" 을(를) 불러왔습니다.');
    renderAll();
  }catch(e){ toast('글꼴을 불러오지 못했습니다. 파일 형식을 확인해 주세요.'); }
  ev.target.value='';
});

});

$('#bgImageBtn').addEventListener('click', ()=> $('#fileBg').click());

$('#dupEl').addEventListener('click', ()=>{
  const el = sel(); if(!el) return;
  const copy = Object.assign({}, el, {id:idSeq++, x:el.x+40, y:el.y+40});
  if(el.crop) copy.crop = Object.assign({}, el.crop);
  if(el.adjust) copy.adjust = Object.assign({}, el.adjust);
  if(copy.type==='video') copy.useAudio = false; // 소리 지정은 1개만 유지
  page().elements.push(copy); selectedId=copy.id; renderAll();
});

/* ---------- 자르기 ---------- */
const cropModal = $('#cropModal'), cropCanvas = $('#cropCanvas');
const cctx = cropCanvas.getContext('2d');
let cropState = null; // {el, cx,cy,cw,ch, fit, cdpr}
function openCrop(){
  const el = sel(); if(!el || el.type==='text') return;
  const maxW = Math.min(window.innerWidth*0.9, 900);
  const maxH = window.innerHeight*0.62;
  const fit = Math.min(maxW/el.w, maxH/el.h);
  const c = el.crop || {cx:0, cy:0, cw:el.w, ch:el.h};
  cropState = {el, cx:c.cx, cy:c.cy, cw:c.cw, ch:c.ch, fit, cdpr:dpr};
  cropCanvas.style.width = (el.w*fit)+'px';
  cropCanvas.style.height = (el.h*fit)+'px';
  cropCanvas.width = Math.round(el.w*fit*dpr);
  cropCanvas.height = Math.round(el.h*fit*dpr);
  cropModal.classList.add('show');
  drawCrop();
}
function drawCrop(){
  const st = cropState; if(!st) return;
  const F = st.fit*st.cdpr;
  cctx.clearRect(0,0,cropCanvas.width,cropCanvas.height);
  cctx.drawImage(st.el.img, 0, 0, st.el.w*F, st.el.h*F);
  cctx.fillStyle = 'rgba(10,11,14,.62)';
  cctx.fillRect(0,0,cropCanvas.width,cropCanvas.height);
  cctx.drawImage(st.el.img, st.cx, st.cy, st.cw, st.ch,
                 st.cx*F, st.cy*F, st.cw*F, st.ch*F);
  cctx.strokeStyle = '#E8B33C'; cctx.lineWidth = 2*st.cdpr;
  cctx.strokeRect(st.cx*F, st.cy*F, st.cw*F, st.ch*F);
  [[st.cx,st.cy],[st.cx+st.cw,st.cy],[st.cx,st.cy+st.ch],[st.cx+st.cw,st.cy+st.ch]].forEach(([px,py])=>{
    cctx.beginPath(); cctx.arc(px*F, py*F, 10*st.cdpr, 0, Math.PI*2);
    cctx.fillStyle = '#E8B33C'; cctx.fill();
    cctx.lineWidth = 2.5*st.cdpr; cctx.strokeStyle = '#1A1608'; cctx.stroke();
  });
}
let cropDrag = null;
function cropPos(ev){
  const r = cropCanvas.getBoundingClientRect();
  return { x:(ev.clientX-r.left)/cropState.fit, y:(ev.clientY-r.top)/cropState.fit };
}
cropCanvas.addEventListener('pointerdown', ev=>{
  if(!cropState) return;
  const p = cropPos(ev), st = cropState;
  const grip = 24/st.fit;
  const corners = [
    ['nw', st.cx, st.cy], ['ne', st.cx+st.cw, st.cy],
    ['sw', st.cx, st.cy+st.ch], ['se', st.cx+st.cw, st.cy+st.ch]
  ];
  for(const [k,px,py] of corners){
    if(Math.hypot(p.x-px, p.y-py) < grip){
      cropDrag = {mode:k, sx:p.x, sy:p.y, o:{cx:st.cx,cy:st.cy,cw:st.cw,ch:st.ch}};
      cropCanvas.setPointerCapture(ev.pointerId); ev.preventDefault(); return;
    }
  }
  if(p.x>=st.cx && p.x<=st.cx+st.cw && p.y>=st.cy && p.y<=st.cy+st.ch){
    cropDrag = {mode:'move', sx:p.x, sy:p.y, o:{cx:st.cx,cy:st.cy,cw:st.cw,ch:st.ch}};
    cropCanvas.setPointerCapture(ev.pointerId); ev.preventDefault();
  }
});
cropCanvas.addEventListener('pointermove', ev=>{
  if(!cropDrag || !cropState) return;
  const p = cropPos(ev), st = cropState, o = cropDrag.o;
  const dx = p.x-cropDrag.sx, dy = p.y-cropDrag.sy;
  const MIN = 24;
  if(cropDrag.mode==='move'){
    st.cx = Math.max(0, Math.min(st.el.w-o.cw, o.cx+dx));
    st.cy = Math.max(0, Math.min(st.el.h-o.ch, o.cy+dy));
  }else{
    let x1=o.cx, y1=o.cy, x2=o.cx+o.cw, y2=o.cy+o.ch;
    if(cropDrag.mode.includes('w')) x1 = Math.max(0, Math.min(x2-MIN, o.cx+dx));
    if(cropDrag.mode.includes('e')) x2 = Math.min(st.el.w, Math.max(x1+MIN, o.cx+o.cw+dx));
    if(cropDrag.mode.includes('n')) y1 = Math.max(0, Math.min(y2-MIN, o.cy+dy));
    if(cropDrag.mode.includes('s')) y2 = Math.min(st.el.h, Math.max(y1+MIN, o.cy+o.ch+dy));
    st.cx=x1; st.cy=y1; st.cw=x2-x1; st.ch=y2-y1;
  }
  drawCrop();
});
const endCropDrag = ()=>{ cropDrag=null; };
cropCanvas.addEventListener('pointerup', endCropDrag);
cropCanvas.addEventListener('pointercancel', endCropDrag);
$('#cropBtn').addEventListener('click', openCrop);
$('#cropFull').addEventListener('click', ()=>{
  if(!cropState) return;
  cropState.cx=0; cropState.cy=0; cropState.cw=cropState.el.w; cropState.ch=cropState.el.h;
  drawCrop();
});
$('#cropCancel').addEventListener('click', ()=>{ cropModal.classList.remove('show'); cropState=null; });
$('#cropApply').addEventListener('click', ()=>{
  const st = cropState; if(!st) return;
  const full = st.cx===0 && st.cy===0 && st.cw===st.el.w && st.ch===st.el.h;
  st.el.crop = full ? null : {cx:Math.round(st.cx), cy:Math.round(st.cy), cw:Math.round(st.cw), ch:Math.round(st.ch)};
  cropModal.classList.remove('show'); cropState=null;
  redraw();
});
$('#cropReset').addEventListener('click', onSel(el=>{ el.crop=null; }));

/* ---------- 영상 ---------- */
function loadVideoFile(file){
  return new Promise((res,rej)=>{
    const v = document.createElement('video');
    v.playsInline = true; v.muted = true; v.loop = true; v.preload = 'auto';
    v.onloadeddata = ()=>res(v);
    v.onerror = ()=>rej(new Error('영상을 불러오지 못했습니다: '+file.name));
    v.src = URL.createObjectURL(file); // 영상은 용량 때문에 blob URL 사용 (사파리 정상 지원)
  });
}
$('#addVideoBtn').addEventListener('click', ()=> $('#fileVideo').click());
$('#fileVideo').addEventListener('change', async ev=>{
  const f = ev.target.files[0]; if(!f) return;
  try{
    const v = await loadVideoFile(f);
    const fit = Math.min(canvasW*0.6/v.videoWidth, canvasH*0.6/v.videoHeight, 1);
    const el = {
      id:idSeq++, type:'video', img:v, name:f.name,
      w:v.videoWidth, h:v.videoHeight, scale:fit, crop:null,
      borderColor:'#111111', borderW:0, useAudio:false,
      trimStart:0, trimEnd:(v.duration||0),
      adjust:{blur:0,bright:0,temp:0,tint:0,sat:0},
      x:canvasW*0.1, y:canvasH*0.1, opacity:1
    };
    page().elements.push(el); selectedId = el.id;
    v.addEventListener('seeked', redraw, {once:true});
    v.currentTime = 0.05; // 첫 프레임 표시 유도
    renderAll();
  }catch(e){ toast(e.message); }
  ev.target.value='';
});
$('#vidAudio').addEventListener('change', ev=>{
  const el = sel(); if(!el || el.type!=='video') return;
  if(ev.target.checked){
    page().elements.forEach(e=>{ if(e.type==='video') e.useAudio=false; });
    el.useAudio = true;
  }else{
    el.useAudio = false;
  }
});
$('#trimStart').addEventListener('change', onSel((el,ev)=>{
  if(el.type!=='video') return;
  const d = el.img.duration||0;
  const v = Math.max(0, Math.min(+ev.target.value||0, (el.trimEnd!=null?el.trimEnd:d)-0.2));
  el.trimStart = v; ev.target.value = v.toFixed(1);
}));
$('#trimEnd').addEventListener('change', onSel((el,ev)=>{
  if(el.type!=='video') return;
  const d = el.img.duration||0;
  const v = Math.min(d, Math.max(+ev.target.value||d, (el.trimStart||0)+0.2));
  el.trimEnd = v; ev.target.value = v.toFixed(1);
}));
function trimOf(v){
  const d = v.img.duration||0;
  const st = v.trimStart||0;
  const en = (v.trimEnd!=null && v.trimEnd>st) ? v.trimEnd : d;
  return {st, en};
}
function enforceTrim(vids){
  vids.forEach(v=>{
    const t = trimOf(v);
    if(t.en > t.st && (v.img.currentTime >= t.en || v.img.currentTime < t.st-0.05)){
      v.img.currentTime = t.st;
    }
  });
}
/* ---------- 미리 재생 ---------- */
let previewing = false, prevRaf = 0;
function stopPreview(){
  if(!previewing) return;
  previewing = false;
  cancelAnimationFrame(prevRaf);
  page().elements.forEach(e=>{
    if(e.type==='video'){ e.img.pause(); e.img.muted = true; e.img.currentTime = (e.trimStart||0); }
  });
  $('#previewBtn').textContent = '미리 재생';
  redraw();
}
$('#previewBtn').addEventListener('click', ()=>{
  if(previewing){ stopPreview(); return; }
  const vids = page().elements.filter(e=>e.type==='video');
  if(!vids.length){ toast('현재 페이지에 영상이 없습니다.'); return; }
  previewing = true;
  $('#previewBtn').textContent = '정지';
  vids.forEach(v=>{
    v.img.currentTime = trimOf(v).st;
    v.img.muted = !v.useAudio;
    const p = v.img.play(); if(p && p.catch) p.catch(()=>{});
  });
  (function loop(){
    if(!previewing) return;
    enforceTrim(vids);
    redraw();
    prevRaf = requestAnimationFrame(loop);
  })();
});

/* ---------- 내보내기 ---------- */
function renderPageToDataURL(pg, s){
  const c = document.createElement('canvas');
  c.width = canvasW*s; c.height = canvasH*s;
  renderScene(c.getContext('2d'), pg, s);
  return c.toDataURL('image/png');
}
function dataURLtoFile(dataURL, fname){
  const bin = atob(dataURL.split(',')[1]);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new File([bytes], fname, {type:'image/png'});
}
$('#exportBtn').addEventListener('click', ()=>{
  try{
    const s = +$('#exportScale').value;
    const range = $('#exportRange').value;
    const targets = range==='all' ? pages : [page()];
    const files = [], urls = [];
    targets.forEach((pg,i)=>{
      const u = renderPageToDataURL(pg, s);
      urls.push(u);
      files.push(dataURLtoFile(u, 'collage_p'+(i+1)+'_'+canvasW*s+'x'+canvasH*s+'.png'));
    });
    if(navigator.canShare && navigator.canShare({files})){
      navigator.share({files})
        .then(()=>toast('공유 시트에서 "이미지 저장"을 누르면 '+files.length+'장이 갤러리에 저장됩니다.'))
        .catch(err=>{ if(err.name!=='AbortError') fallbackExport(urls); });
    }else{
      fallbackExport(urls);
    }
  }catch(e){ toast('내보내기 중 오류: '+e.message+' (배율을 낮춰 다시 시도해 보세요)'); }
});
function fallbackExport(urls){
  urls.forEach((u,i)=>{
    const a = document.createElement('a');
    a.href = u; a.download = 'collage_p'+(i+1)+'.png';
    document.body.appendChild(a); a.click(); a.remove();
  });
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:150;display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px;overflow-y:auto;';
  const tip = document.createElement('p');
  tip.textContent = '이 환경에서는 공유 시트를 열 수 없습니다. 각 이미지를 길게 눌러 저장하거나, 사파리에서 열어 다시 시도하세요.';
  tip.style.cssText = 'color:#E9EAEC;font-size:14px;margin:0;text-align:center;';
  ov.appendChild(tip);
  urls.forEach(u=>{
    const im = document.createElement('img');
    im.src = u;
    im.style.cssText = 'max-width:88%;box-shadow:0 8px 40px rgba(0,0,0,.6);flex:0 0 auto;';
    ov.appendChild(im);
  });
  const close = document.createElement('button');
  close.textContent = '닫기';
  close.addEventListener('click', ()=>ov.remove());
  ov.appendChild(close);
  document.body.appendChild(ov);
}

/* ---------- 영상 내보내기 ---------- */
let audioCtx = null;
const audioSrcMap = new WeakMap(); // createMediaElementSource는 요소당 1회만 허용되므로 재사용
$('#exportVidBtn').addEventListener('click', ()=>{
  const pg = page();
  const vids = pg.elements.filter(e=>e.type==='video');
  if(!vids.length){ toast('현재 페이지에 영상이 없습니다. 영상 추가 후 사용하세요.'); return; }
  if(typeof MediaRecorder === 'undefined'){ toast('이 브라우저는 화면 녹화를 지원하지 않습니다.'); return; }
  const s = +$('#exportScale').value;
  const W = canvasW*s, H = canvasH*s;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  c.style.cssText = 'position:fixed;left:0;top:0;width:2px;height:2px;opacity:0.01;pointer-events:none;';
  document.body.appendChild(c); // 사파리 안정성 위해 문서에 부착한 상태로 녹화
  const ctx = c.getContext('2d');
  stopPreview();
  // 기준 영상: 구간이 가장 긴 영상. 종료는 이 영상의 실제 재생 위치로 판단한다.
  let master = vids[0], masterT = trimOf(vids[0]);
  vids.forEach(v=>{ const t=trimOf(v); if(t.en-t.st > masterT.en-masterT.st){ master=v; masterT=t; } });
  const dur = Math.min(300, Math.max(0.5, masterT.en - masterT.st));

  const stream = c.captureStream(30);
  const audioEl = vids.find(v=>v.useAudio);
  if(audioEl){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      audioCtx.resume();
      let src = audioSrcMap.get(audioEl.img);
      if(!src){ src = audioCtx.createMediaElementSource(audioEl.img); audioSrcMap.set(audioEl.img, src); }
      const dest = audioCtx.createMediaStreamDestination();
      src.connect(dest);
      src.connect(audioCtx.destination); // 녹화 중에도 소리가 들리도록
      audioEl.img.muted = false;
      dest.stream.getAudioTracks().forEach(t=>stream.addTrack(t));
    }catch(e){ toast('소리 연결에 실패해 무음으로 진행합니다.'); }
  }
  let mime = '';
  if(MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported('video/mp4')) mime = 'video/mp4';
  else if(MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported('video/webm')) mime = 'video/webm';
  const opts = { videoBitsPerSecond: Math.min(60e6, 10e6*s*s) };
  if(mime) opts.mimeType = mime;
  const rec = new MediaRecorder(stream, opts);
  const chunks = [];
  rec.ondataavailable = e=>{ if(e.data && e.data.size) chunks.push(e.data); };

  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(10,11,14,.9);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;';
  const msg = document.createElement('p'); msg.style.cssText = 'color:#E9EAEC;margin:0;font-size:15px;';
  const bar = document.createElement('div'); bar.style.cssText = 'width:min(420px,80vw);height:8px;background:#2A2E36;border-radius:4px;overflow:hidden;';
  const fill = document.createElement('div'); fill.style.cssText = 'height:100%;width:0%;background:#E8B33C;'; bar.appendChild(fill);
  const cancelBtn = document.createElement('button'); cancelBtn.textContent = '취소';
  const note = document.createElement('p');
  note.textContent = '녹화는 실시간으로 진행됩니다. 이 화면을 벗어나면 프레임이 끊길 수 있어요.';
  note.style.cssText = 'color:#9AA0AB;font-size:12px;margin:0;text-align:center;';
  ov.appendChild(msg); ov.appendChild(bar); ov.appendChild(cancelBtn); ov.appendChild(note);
  document.body.appendChild(ov);

  let cancelled = false, raf = 0;
  function cleanup(){
    cancelAnimationFrame(raf);
    vids.forEach(v=>{ v.img.pause(); v.img.muted = true; v.img.loop = true; });
    ov.remove(); c.remove();
  }
  cancelBtn.addEventListener('click', ()=>{ cancelled = true; try{rec.stop();}catch(e){} });
  rec.onstop = ()=>{
    cleanup();
    if(cancelled || !chunks.length){ if(cancelled) toast('내보내기를 취소했습니다.'); return; }
    const type = mime || 'video/mp4';
    const blob = new Blob(chunks, {type});
    const ext = type.indexOf('mp4') >= 0 ? 'mp4' : 'webm';
    const file = new File([blob], 'collage_'+W+'x'+H+'.'+ext, {type});
    showVideoResult(file, blob); // 공유 시트는 새 탭 직후에만 열 수 있어 결과 화면의 버튼에서 실행
  };
  rec.onerror = ()=>{ cancelled = true; cleanup(); toast('녹화 중 오류가 발생했습니다. 배율을 낮춰 다시 시도해 보세요.'); };

  master.img.loop = false; // 기준 영상은 끝을 감지해야 하므로 반복 금지
  const others = vids.filter(v=>v!==master);
  // 모든 영상이 시작 지점으로 이동 완료된 뒤에 녹화를 시작 (준비 지연으로 인한 끝 잘림 방지)
  Promise.all(vids.map(v=>new Promise(res=>{
    const el = v.img;
    const done = ()=>{ el.removeEventListener('seeked', done); res(); };
    el.addEventListener('seeked', done);
    el.currentTime = trimOf(v).st;
    setTimeout(done, 700); // seeked가 안 오는 경우 대비
  }))).then(()=>{
    vids.forEach(v=>{ const p = v.img.play(); if(p && p.catch) p.catch(()=>{}); });
    rec.start(1000);
    const t0 = performance.now();
    function frame(){
      enforceTrim(others); // 기준 영상은 반복시키지 않는다
      renderScene(ctx, pg, s);
      const prog = Math.min(dur, Math.max(0, master.img.currentTime - masterT.st));
      const wall = (performance.now()-t0)/1000;
      fill.style.width = Math.min(100, prog/dur*100)+'%';
      msg.textContent = '영상 내보내는 중 '+prog.toFixed(1)+' / '+dur.toFixed(1)+'초 ('+W+'×'+H+')';
      // 종료: 기준 영상이 실제로 구간 끝에 도달했을 때 (벽시계는 예외 상황 대비 안전 시한)
      if(master.img.ended || master.img.currentTime >= masterT.en - 0.03 || wall >= dur + 5){
        try{rec.stop();}catch(e){} return;
      }
      raf = requestAnimationFrame(frame);
    }
    frame();
  });
});
function showVideoResult(file, blob){
  const url = URL.createObjectURL(blob);
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(10,11,14,.92);z-index:160;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:16px;';
  const vd = document.createElement('video');
  vd.src = url; vd.controls = true; vd.playsInline = true;
  vd.style.cssText = 'max-width:90%;max-height:60%;box-shadow:0 8px 40px rgba(0,0,0,.6);background:#000;';
  const tip = document.createElement('p');
  tip.textContent = '녹화가 끝났습니다. 결과를 확인한 뒤 저장을 누르세요.';
  tip.style.cssText = 'color:#E9EAEC;font-size:14px;margin:0;text-align:center;';
  const row = document.createElement('div'); row.style.cssText = 'display:flex;gap:10px;';
  const save = document.createElement('button'); save.textContent = '갤러리에 저장'; save.className = 'primary';
  const close = document.createElement('button'); close.textContent = '닫기';
  save.addEventListener('click', ()=>{
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file]})
        .then(()=>toast('공유 시트에서 "비디오 저장"을 누르면 갤러리에 저장됩니다.'))
        .catch(err=>{ if(err.name!=='AbortError') videoFallback(blob, file.name); });
    }else{
      videoFallback(blob, file.name);
    }
  });
  close.addEventListener('click', ()=>{ vd.pause(); ov.remove(); setTimeout(()=>URL.revokeObjectURL(url), 1000); });
  row.appendChild(save); row.appendChild(close);
  ov.appendChild(vd); ov.appendChild(tip); ov.appendChild(row);
  document.body.appendChild(ov);
}
function videoFallback(blob, fname){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); a.remove();
  toast('다운로드를 시도했습니다. 저장이 안 되면 사파리에서 열었는지 확인해 주세요.');
  setTimeout(()=>URL.revokeObjectURL(url), 120000);
}

/* ---------- init ---------- */
renderAll();
})();
</script>

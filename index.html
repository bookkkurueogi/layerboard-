<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>레이어보드 — 이미지 콜라주 편집기</title>
<style>
  :root{
    --bg:#17191E; --panel:#1F2228; --surface:#2A2E36; --line:#3A3F49;
    --text:#E9EAEC; --muted:#9AA0AB; --accent:#E8B33C; --accent-ink:#1A1608;
    --danger:#E0604F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overflow:hidden;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",sans-serif;
    font-size:14px; display:flex; flex-direction:column;
  }
  header{
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; border-bottom:1px solid var(--line); background:var(--panel);
    flex:0 0 auto;
  }
  header h1{font-size:15px; font-weight:700; margin:0; letter-spacing:-0.01em;}
  header h1 span{color:var(--accent);}
  header .spacer{flex:1;}
  button{
    font:inherit; color:var(--text); background:var(--surface);
    border:1px solid var(--line); border-radius:8px;
    padding:9px 14px; cursor:pointer; min-height:40px;
  }
  button:active{transform:translateY(1px);}
  button.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700;}
  button.danger{color:var(--danger); border-color:#5a3530;}
  button.small{padding:6px 10px; min-height:34px; font-size:13px;}
  button:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  main{flex:1; display:flex; min-height:0;}
  #stageWrap{
    flex:1; min-width:0; display:flex; align-items:center; justify-content:center;
    padding:20px; overflow:hidden; position:relative;
  }
  #stageCanvas{
    touch-action:none; user-select:none; -webkit-user-select:none;
    box-shadow:0 8px 40px rgba(0,0,0,.5), 0 0 0 1px var(--line);
    background:
      linear-gradient(45deg,#20232A 25%,transparent 25%,transparent 75%,#20232A 75%),
      linear-gradient(45deg,#20232A 25%,transparent 25%,transparent 75%,#20232A 75%),
      #1B1E24;
    background-size:24px 24px; background-position:0 0,12px 12px;
  }

  #panel{
    flex:0 0 300px; background:var(--panel); border-left:1px solid var(--line);
    overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px;
    display:flex; flex-direction:column; gap:16px;
  }
  section{display:flex; flex-direction:column; gap:9px;}
  section h2{
    font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--muted);
    text-transform:uppercase; margin:0; border-bottom:1px solid var(--line); padding-bottom:6px;
  }
  .row{display:flex; align-items:center; gap:8px;}
  .row label{flex:0 0 84px; color:var(--muted); font-size:13px;}
  .row .grow{flex:1; min-width:0;}
  input[type=text],input[type=number],select,textarea{
    font:inherit; color:var(--text); background:var(--surface);
    border:1px solid var(--line); border-radius:8px; padding:8px 10px; width:100%;
    min-height:40px;
  }
  textarea{resize:vertical; min-height:64px;}
  input[type=color]{
    width:44px; height:40px; padding:2px; border:1px solid var(--line);
    border-radius:8px; background:var(--surface); flex:0 0 auto;
  }
  input[type=range]{width:100%; accent-color:var(--accent);}
  input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent); outline-offset:1px;}
  .btnrow{display:flex; gap:8px; flex-wrap:wrap;}
  .btnrow button{flex:1;}
  .hint{color:var(--muted); font-size:12px; line-height:1.5; margin:0;}
  .toggle{display:flex; align-items:center; gap:8px; cursor:pointer;}
  .toggle input{width:20px; height:20px; accent-color:var(--accent);}
  #pageTabs{display:flex; gap:6px; flex-wrap:wrap;}
  #pageTabs button{flex:0 0 auto; min-width:44px;}
  #pageTabs button.active{border-color:var(--accent); color:var(--accent); font-weight:700;}
  #layerList{display:flex; flex-direction:column; gap:6px;}
  .layer-item{
    display:flex; align-items:center; gap:8px; padding:8px 10px;
    background:var(--surface); border:1px solid var(--line); border-radius:8px; cursor:pointer;
  }
  .layer-item.active{border-color:var(--accent);}
  .layer-item .name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px;}
  .layer-item .tag{font-size:11px; color:var(--muted); font-family:ui-monospace,monospace;}
  #empty{color:var(--muted); font-size:13px;}
  .dim{font-family:ui-monospace,monospace; font-size:12px; color:var(--muted);}
  #toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:10px 16px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:200;
    max-width:86vw; text-align:center;
  }
  #toast.show{opacity:1;}
  /* crop modal */
  #cropModal{
    position:fixed; inset:0; background:rgba(10,11,14,.92); z-index:100;
    display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:16px;
  }
  #cropModal.show{display:flex;}
  #cropCanvas{touch-action:none; box-shadow:0 8px 40px rgba(0,0,0,.6);}
  #cropModal .btnrow{width:min(480px,90vw);}
  @media (max-width:820px){
    main{flex-direction:column;}
    #panel{flex:0 0 46%; border-left:none; border-top:1px solid var(--line);}
    #stageWrap{padding:12px;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
</head>
<body>
<header>
  <h1>레이어<span>보드</span></h1>
  <span class="dim" id="canvasDim"></span>
  <div class="spacer"></div>
  <button class="primary" id="exportBtn">PNG 내보내기</button>
</header>

<main>
  <div id="stageWrap"><canvas id="stageCanvas"></canvas></div>

  <div id="panel">
    <section>
      <h2>페이지</h2>
      <div id="pageTabs"></div>
      <div class="btnrow">
        <button class="small" id="addPage">페이지 추가</button>
        <button class="small danger" id="delPage">현재 페이지 삭제</button>
      </div>
    </section>

    <section>
      <h2>추가</h2>
      <div class="btnrow">
        <button id="addImageBtn">사진 추가</button>
        <button id="addTextBtn">텍스트 추가</button>
      </div>
      <div class="btnrow">
        <button id="addFontBtn">글꼴 파일 업로드 (.ttf / .otf)</button>
      </div>
      <p class="hint">업로드한 글꼴은 이 페이지를 열어둔 동안만 유지됩니다. 새로고침하면 다시 업로드해야 해요.</p>
    </section>

    <section>
      <h2>캔버스 (모든 페이지 공통)</h2>
      <div class="row"><label>크기</label>
        <select id="sizePreset" class="grow">
          <option value="1080x1080">정사각 1080×1080</option>
          <option value="1080x1350">세로 4:5 1080×1350</option>
          <option value="1080x1920">세로 9:16 1080×1920</option>
          <option value="1920x1080">가로 16:9 1920×1080</option>
          <option value="custom">직접 입력</option>
        </select>
      </div>
      <div class="row" id="customSizeRow" style="display:none">
        <label>픽셀</label>
        <input type="number" id="customW" value="1080" min="100" max="8000" style="width:0" class="grow">
        <span>×</span>
        <input type="number" id="customH" value="1080" min="100" max="8000" style="width:0" class="grow">
        <button class="small" id="applyCustom">적용</button>
      </div>
      <div class="row"><label>배경 색</label>
        <input type="color" id="bgColor" value="#ffffff">
        <button class="small grow" id="bgImageBtn">배경 사진</button>
        <button class="small" id="bgImageClear">지움</button>
      </div>
      <div class="row"><label>내보내기 배율</label>
        <select id="exportScale" class="grow">
          <option value="1">1× (기본 크기)</option>
          <option value="2" selected>2× (고해상도)</option>
          <option value="3">3×</option>
        </select>
      </div>
      <div class="row"><label>내보내기 범위</label>
        <select id="exportRange" class="grow">
          <option value="current">현재 페이지만</option>
          <option value="all">전체 페이지</option>
        </select>
      </div>
    </section>

    <section id="propsSection" style="display:none">
      <h2>선택한 요소</h2>
      <div id="imageProps" style="display:none; flex-direction:column; gap:9px;">
        <div class="row"><label>크기</label><input type="range" id="imgScale" min="5" max="200" value="100"></div>
        <div class="row"><label>불투명도</label><input type="range" id="imgOpacity" min="10" max="100" value="100"></div>
        <div class="row"><label>테두리 색</label><input type="color" id="imgBorderColor" value="#111111"></div>
        <div class="row"><label>테두리 두께</label><input type="range" id="imgBorderW" min="0" max="40" value="0"><span class="dim" id="imgBorderWVal">0</span></div>
        <div class="btnrow"><button class="small" id="cropBtn">자르기</button><button class="small" id="cropReset">자르기 해제</button></div>
      </div>
      <div id="textProps" style="display:none; flex-direction:column; gap:9px;">
        <textarea id="tContent" placeholder="텍스트 내용"></textarea>
        <div class="row"><label>글꼴</label><select id="tFont" class="grow"></select></div>
        <div class="row"><label>크기</label><input type="range" id="tSize" min="10" max="240" value="48"><span class="dim" id="tSizeVal">48</span></div>
        <div class="row"><label>글자 색</label><input type="color" id="tColor" value="#111111">
          <label class="toggle grow"><input type="checkbox" id="tBold" checked> 굵게</label>
        </div>
        <label class="toggle"><input type="checkbox" id="tBgOn"> 텍스트 배경(직사각형)</label>
        <div id="tBgProps" style="display:none; flex-direction:column; gap:9px;">
          <div class="row"><label>배경 색</label><input type="color" id="tBgColor" value="#ffffff"></div>
          <div class="row"><label>테두리 색</label><input type="color" id="tBorderColor" value="#111111"></div>
          <div class="row"><label>테두리 두께</label><input type="range" id="tBorderW" min="0" max="20" value="2"><span class="dim" id="tBorderWVal">2</span></div>
          <div class="row"><label>안쪽 여백</label><input type="range" id="tPad" min="0" max="80" value="16"><span class="dim" id="tPadVal">16</span></div>
        </div>
      </div>
      <div class="btnrow">
        <button class="small" id="layerUp">한 칸 위로</button>
        <button class="small" id="layerDown">한 칸 아래로</button>
      </div>
      <div class="btnrow">
        <button class="small" id="dupEl">복제</button>
        <button class="small danger" id="delEl">삭제</button>
      </div>
    </section>

    <section>
      <h2>레이어 (위쪽이 앞)</h2>
      <div id="layerList"></div>
      <p id="empty" class="hint">아직 요소가 없습니다. 사진이나 텍스트를 추가해 보세요.</p>
    </section>
  </div>
</main>

<div id="cropModal">
  <canvas id="cropCanvas"></canvas>
  <div class="btnrow">
    <button id="cropCancel">취소</button>
    <button id="cropFull">전체 선택</button>
    <button class="primary" id="cropApply">적용</button>
  </div>
  <p class="hint">사각형 안쪽을 끌면 이동, 모서리 점을 끌면 크기 조절이 됩니다.</p>
</div>

<input type="file" id="fileImage" accept="image/*" multiple hidden>
<input type="file" id="fileBg" accept="image/*" hidden>
<input type="file" id="fileFont" accept=".ttf,.otf,.woff,.woff2" hidden>
<div id="toast"></div>

<script>
(function(){
'use strict';
/* ---------- state ---------- */
let canvasW = 1080, canvasH = 1080;
let idSeq = 1, pageSeq = 1;
function newPage(){ return {id:pageSeq++, bgColor:'#ffffff', bgImage:null, elements:[]}; }
let pages = [newPage()];
let cur = 0;                       // current page index
let selectedId = null;
let viewScale = 1;
const dpr = Math.min(window.devicePixelRatio||1, 3);
const uploadedFonts = [];
const SYSTEM_FONTS = [
  ['-apple-system, "Apple SD Gothic Neo", sans-serif','기본 고딕(시스템)'],
  ['"Apple SD Gothic Neo", sans-serif','애플 SD 고딕'],
  ['serif','명조(시스템 세리프)'],
  ['ui-monospace, monospace','고정폭']
];

const $ = s => document.querySelector(s);
const stage = $('#stageCanvas'), stageWrap = $('#stageWrap');
const sctx = stage.getContext('2d');
const mctx = document.createElement('canvas').getContext('2d'); // 측정 전용

function page(){ return pages[cur]; }
function sel(){ return page().elements.find(e=>e.id===selectedId) || null; }
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._h); toast._h = setTimeout(()=>t.classList.remove('show'), 3000);
}

/* ==========================================================
   공유 렌더 코드: 편집 화면과 내보내기가 동일한 함수를 사용
   ========================================================== */
function fontString(el, s){
  return (el.bold ? '700 ' : '400 ') + (el.fontSize*s) + 'px ' + el.font;
}
function textBox(el){ // scale 1 기준 상자 크기
  mctx.font = fontString(el, 1);
  const lines = el.text.split('\n');
  const fs = el.fontSize, lh = Math.round(fs*1.3);
  let maxW = 0;
  lines.forEach(l=>{ maxW = Math.max(maxW, mctx.measureText(l).width); });
  const extra = el.bgOn ? (el.pad + el.borderW)*2 : 0;
  return { w: maxW + extra, h: lines.length*lh + extra, lh, fs };
}
function drawTextEl(ctx, el, s){
  ctx.font = fontString(el, s);
  ctx.textBaseline = 'top';
  const lines = el.text.split('\n');
  const fs = el.fontSize*s, lh = Math.round(el.fontSize*1.3)*s;
  const pad = el.pad*s, bw = el.borderW*s;
  let maxW = 0;
  lines.forEach(l=>{ maxW = Math.max(maxW, ctx.measureText(l).width); });
  const extra = el.bgOn ? (pad+bw)*2 : 0;
  const boxW = maxW + extra, boxH = lines.length*lh + extra;
  const x = el.x*s, y = el.y*s;
  if(el.bgOn){
    ctx.fillStyle = el.bgColor;
    ctx.fillRect(x, y, boxW, boxH);
    if(bw>0){
      ctx.strokeStyle = el.borderColor; ctx.lineWidth = bw;
      ctx.strokeRect(x+bw/2, y+bw/2, boxW-bw, boxH-bw);
    }
  }
  ctx.fillStyle = el.color;
  const off = el.bgOn ? pad+bw : 0;
  lines.forEach((l,i)=>{
    ctx.fillText(l, x+off, y+off + i*lh + (lh-fs)/2);
  });
}
function imgDrawSize(el){ // scale 1 기준 표시 크기
  const cw = el.crop ? el.crop.cw : el.w;
  const ch = el.crop ? el.crop.ch : el.h;
  return { w: cw*el.scale, h: ch*el.scale };
}
function drawImageEl(ctx, el, s){
  const d = imgDrawSize(el);
  ctx.globalAlpha = el.opacity;
  if(el.crop){
    ctx.drawImage(el.img, el.crop.cx, el.crop.cy, el.crop.cw, el.crop.ch,
                  el.x*s, el.y*s, d.w*s, d.h*s);
  }else{
    ctx.drawImage(el.img, el.x*s, el.y*s, d.w*s, d.h*s);
  }
  if(el.borderW > 0){
    const bw = el.borderW*s;
    ctx.strokeStyle = el.borderColor; ctx.lineWidth = bw;
    ctx.strokeRect(el.x*s+bw/2, el.y*s+bw/2, d.w*s-bw, d.h*s-bw);
  }
  ctx.globalAlpha = 1;
}
function renderScene(ctx, pg, s){
  ctx.fillStyle = pg.bgColor;
  ctx.fillRect(0, 0, canvasW*s, canvasH*s);
  if(pg.bgImage){
    const iw = pg.bgImage.naturalWidth, ih = pg.bgImage.naturalHeight;
    const cover = Math.max(canvasW*s/iw, canvasH*s/ih);
    const dw = iw*cover, dh = ih*cover;
    ctx.drawImage(pg.bgImage, (canvasW*s-dw)/2, (canvasH*s-dh)/2, dw, dh);
  }
  pg.elements.forEach(el=>{
    if(el.type==='image') drawImageEl(ctx, el, s);
    else drawTextEl(ctx, el, s);
  });
}

/* ---------- 편집 화면 그리기 ---------- */
function elBox(el){ // scale 1 기준 히트 박스
  if(el.type==='image'){ const d=imgDrawSize(el); return {x:el.x, y:el.y, w:d.w, h:d.h}; }
  const b = textBox(el); return {x:el.x, y:el.y, w:b.w, h:b.h};
}
function redraw(){
  const S = viewScale*dpr;
  stage.width = Math.round(canvasW*S);
  stage.height = Math.round(canvasH*S);
  stage.style.width = (canvasW*viewScale)+'px';
  stage.style.height = (canvasH*viewScale)+'px';
  renderScene(sctx, page(), S);
  const el = sel();
  if(el){
    const b = elBox(el);
    sctx.save();
    sctx.strokeStyle = '#E8B33C'; sctx.lineWidth = 2*dpr;
    sctx.setLineDash([6*dpr, 5*dpr]);
    sctx.strokeRect(b.x*S-2*dpr, b.y*S-2*dpr, b.w*S+4*dpr, b.h*S+4*dpr);
    sctx.setLineDash([]);
    const hx = (b.x+b.w)*S, hy = (b.y+b.h)*S;
    sctx.beginPath(); sctx.arc(hx, hy, 11*dpr, 0, Math.PI*2);
    sctx.fillStyle = '#E8B33C'; sctx.fill();
    sctx.lineWidth = 2.5*dpr; sctx.strokeStyle = '#1A1608'; sctx.stroke();
    sctx.restore();
  }
}
function fitStage(){
  const pad = 24;
  const availW = stageWrap.clientWidth - pad, availH = stageWrap.clientHeight - pad;
  viewScale = Math.min(availW/canvasW, availH/canvasH, 1);
  if(viewScale<=0 || !isFinite(viewScale)) viewScale = 0.1;
  $('#canvasDim').textContent = canvasW+'×'+canvasH+' · '+(cur+1)+'/'+pages.length+'페이지';
  redraw();
}
window.addEventListener('resize', fitStage);
function renderAll(){ fitStage(); renderPageTabs(); renderLayerList(); renderProps(); }

/* ---------- 포인터: 이동/크기 조절 ---------- */
let drag = null;
function stagePos(ev){
  const r = stage.getBoundingClientRect();
  return { x:(ev.clientX-r.left)/viewScale, y:(ev.clientY-r.top)/viewScale };
}
stage.addEventListener('pointerdown', ev=>{
  const p = stagePos(ev);
  const el = sel();
  const grip = 18/viewScale;
  if(el){
    const b = elBox(el);
    if(Math.hypot(p.x-(b.x+b.w), p.y-(b.y+b.h)) < grip){
      drag = {mode:'resize', el, sx:p.x, sy:p.y,
              scale:el.scale, fontSize:el.fontSize, bw:b.w};
      stage.setPointerCapture(ev.pointerId); ev.preventDefault(); return;
    }
  }
  const list = page().elements;
  for(let i=list.length-1; i>=0; i--){
    const b = elBox(list[i]);
    if(p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h){
      selectedId = list[i].id;
      drag = {mode:'move', el:list[i], sx:p.x, sy:p.y, ox:list[i].x, oy:list[i].y};
      stage.setPointerCapture(ev.pointerId);
      renderLayerList(); renderProps(); redraw();
      ev.preventDefault(); return;
    }
  }
  selectedId = null; renderLayerList(); renderProps(); redraw();
});
stage.addEventListener('pointermove', ev=>{
  if(!drag) return;
  const p = stagePos(ev);
  const dx = p.x-drag.sx, dy = p.y-drag.sy;
  const el = drag.el;
  if(drag.mode==='move'){ el.x = drag.ox+dx; el.y = drag.oy+dy; }
  else{
    if(el.type==='image'){
      const cw = el.crop ? el.crop.cw : el.w;
      el.scale = Math.max(30, drag.bw+dx)/cw;
    }else{
      const ratio = Math.max(0.1, (drag.bw+dx)/drag.bw);
      el.fontSize = Math.max(10, Math.min(400, Math.round(drag.fontSize*ratio)));
    }
  }
  redraw();
  if(drag.mode==='resize') renderProps();
});
const endDrag = ()=>{ drag=null; };
stage.addEventListener('pointerup', endDrag);
stage.addEventListener('pointercancel', endDrag);

/* ---------- 페이지 ---------- */
function renderPageTabs(){
  const box = $('#pageTabs'); box.innerHTML='';
  pages.forEach((pg,i)=>{
    const b = document.createElement('button');
    b.className = 'small'+(i===cur?' active':'');
    b.textContent = (i+1);
    b.addEventListener('click', ()=>{ cur=i; selectedId=null; renderAll(); });
    box.appendChild(b);
  });
}
$('#addPage').addEventListener('click', ()=>{
  pages.splice(cur+1, 0, newPage());
  cur = cur+1; selectedId=null; renderAll();
});
$('#delPage').addEventListener('click', ()=>{
  if(pages.length<=1){ toast('마지막 페이지는 삭제할 수 없습니다.'); return; }
  pages.splice(cur,1); cur = Math.min(cur, pages.length-1); selectedId=null; renderAll();
});

/* ---------- 레이어 목록 ---------- */
function renderLayerList(){
  const list = $('#layerList'); list.innerHTML='';
  const els = page().elements;
  $('#empty').style.display = els.length ? 'none':'block';
  [...els].reverse().forEach(el=>{
    const item = document.createElement('div');
    item.className='layer-item'+(el.id===selectedId?' active':'');
    const tag = document.createElement('span'); tag.className='tag';
    tag.textContent = el.type==='image'?'IMG':'TXT';
    const name = document.createElement('span'); name.className='name';
    name.textContent = el.type==='image' ? (el.name||'사진') : (el.text.split('\n')[0]||'텍스트');
    item.appendChild(tag); item.appendChild(name);
    item.addEventListener('click', ()=>{ selectedId=el.id; renderLayerList(); renderProps(); redraw(); });
    list.appendChild(item);
  });
}

/* ---------- 속성 패널 ---------- */
function renderProps(){
  const el = sel();
  $('#propsSection').style.display = el ? 'flex':'none';
  if(!el) return;
  $('#imageProps').style.display = el.type==='image' ? 'flex':'none';
  $('#textProps').style.display  = el.type==='text' ? 'flex':'none';
  if(el.type==='image'){
    $('#imgScale').value = Math.max(5, Math.min(200, Math.round(el.scale*100)));
    $('#imgOpacity').value = Math.round(el.opacity*100);
    $('#imgBorderColor').value = el.borderColor || '#111111';
    $('#imgBorderW').value = el.borderW || 0;
    $('#imgBorderWVal').textContent = el.borderW || 0;
  }else{
    $('#tContent').value = el.text;
    $('#tSize').value = el.fontSize; $('#tSizeVal').textContent = el.fontSize;
    $('#tColor').value = el.color; $('#tBold').checked = el.bold;
    rebuildFontSelect(el.font);
    $('#tBgOn').checked = el.bgOn;
    $('#tBgProps').style.display = el.bgOn ? 'flex':'none';
    $('#tBgColor').value = el.bgColor; $('#tBorderColor').value = el.borderColor;
    $('#tBorderW').value = el.borderW; $('#tBorderWVal').textContent = el.borderW;
    $('#tPad').value = el.pad; $('#tPadVal').textContent = el.pad;
  }
}
function rebuildFontSelect(current){
  const s = $('#tFont'); s.innerHTML='';
  SYSTEM_FONTS.forEach(([v,label])=>{
    const o=document.createElement('option'); o.value=v; o.textContent=label; s.appendChild(o);
  });
  uploadedFonts.forEach(f=>{
    const o=document.createElement('option'); o.value='"'+f+'"'; o.textContent=f+' (업로드)'; s.appendChild(o);
  });
  s.value = current;
  if(s.value !== current){ const o=document.createElement('option'); o.value=current; o.textContent=current; s.appendChild(o); s.value=current; }
}

/* ---------- 요소 추가 ---------- */
function loadImageFile(file){
  return new Promise((res,rej)=>{
    const reader = new FileReader();
    reader.onerror = ()=>rej(new Error('파일을 읽지 못했습니다: '+file.name));
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>res(img);
      img.onerror = ()=>rej(new Error('이 형식을 표시할 수 없습니다: '+file.name+' ('+(file.type||'형식 불명')+'). 사진 앱에서 JPEG로 복제해 시도해 보세요.'));
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
$('#addImageBtn').addEventListener('click', ()=> $('#fileImage').click());
$('#fileImage').addEventListener('change', async ev=>{
  for(const f of ev.target.files){
    try{
      const img = await loadImageFile(f);
      const fit = Math.min(canvasW*0.6/img.naturalWidth, canvasH*0.6/img.naturalHeight, 1);
      const el = {
        id:idSeq++, type:'image', img, name:f.name,
        w:img.naturalWidth, h:img.naturalHeight, scale:fit, crop:null,
        borderColor:'#111111', borderW:0,
        x:canvasW*0.1 + page().elements.length*20, y:canvasH*0.1 + page().elements.length*20, opacity:1
      };
      page().elements.push(el); selectedId = el.id;
    }catch(e){ toast(e.message); }
  }
  ev.target.value=''; renderAll();
});
$('#addTextBtn').addEventListener('click', ()=>{
  const el = {
    id:idSeq++, type:'text', text:'텍스트를 입력하세요',
    font:SYSTEM_FONTS[0][0], fontSize:64, color:'#111111', bold:true,
    bgOn:false, bgColor:'#ffffff', borderColor:'#111111', borderW:2, pad:16,
    x:canvasW*0.12, y:canvasH*0.12
  };
  page().elements.push(el); selectedId = el.id; renderAll();
});

/* ---------- 글꼴 ---------- */
$('#addFontBtn').addEventListener('click', ()=> $('#fileFont').click());
$('#fileFont').addEventListener('change', async ev=>{
  const f = ev.target.files[0]; if(!f) return;
  const name = f.name.replace(/\.(ttf|otf|woff2?|TTF|OTF)$/,'');
  try{
    const buf = await f.arrayBuffer();
    const face = new FontFace(name, buf);
    await face.load();
    document.fonts.add(face);
    uploadedFonts.push(name);
    const el = sel();
    if(el && el.type==='text'){ el.font = '"'+name+'"'; }
    toast('글꼴 "'+name+'" 을(를) 불러왔습니다.');
    renderAll();
  }catch(e){ toast('글꼴을 불러오지 못했습니다. 파일 형식을 확인해 주세요.'); }
  ev.target.value='';
});

/* ---------- 캔버스/배경 ---------- */
$('#sizePreset').addEventListener('change', ev=>{
  const v = ev.target.value;
  $('#customSizeRow').style.display = v==='custom' ? 'flex':'none';
  if(v!=='custom'){
    const [w,h] = v.split('x').map(Number);
    canvasW=w; canvasH=h; renderAll();
  }
});
$('#applyCustom').addEventListener('click', ()=>{
  const w = +$('#customW').value, h = +$('#customH').value;
  if(w>=100 && h>=100 && w<=8000 && h<=8000){ canvasW=w; canvasH=h; renderAll(); }
  else toast('100~8000 픽셀 범위로 입력해 주세요.');
});
$('#bgColor').addEventListener('input', ev=>{ page().bgColor=ev.target.value; redraw(); });
$('#bgImageBtn').addEventListener('click', ()=> $('#fileBg').click());
$('#fileBg').addEventListener('change', async ev=>{
  const f = ev.target.files[0]; if(!f) return;
  try{ page().bgImage = await loadImageFile(f); redraw(); }
  catch(e){ toast(e.message); }
  ev.target.value='';
});
$('#bgImageClear').addEventListener('click', ()=>{ page().bgImage=null; redraw(); });

/* ---------- 속성 입력 ---------- */
function onSel(fn){ return ev=>{ const el=sel(); if(!el) return; fn(el,ev); redraw(); renderLayerList(); }; }
$('#imgScale').addEventListener('input', onSel((el,ev)=>{ el.scale=ev.target.value/100; }));
$('#imgOpacity').addEventListener('input', onSel((el,ev)=>{ el.opacity=ev.target.value/100; }));
$('#imgBorderColor').addEventListener('input', onSel((el,ev)=>{ el.borderColor=ev.target.value; }));
$('#imgBorderW').addEventListener('input', onSel((el,ev)=>{ el.borderW=+ev.target.value; $('#imgBorderWVal').textContent=el.borderW; }));
$('#tContent').addEventListener('input', onSel((el,ev)=>{ el.text=ev.target.value; }));
$('#tFont').addEventListener('change', onSel((el,ev)=>{ el.font=ev.target.value; }));
$('#tSize').addEventListener('input', onSel((el,ev)=>{ el.fontSize=+ev.target.value; $('#tSizeVal').textContent=el.fontSize; }));
$('#tColor').addEventListener('input', onSel((el,ev)=>{ el.color=ev.target.value; }));
$('#tBold').addEventListener('change', onSel((el,ev)=>{ el.bold=ev.target.checked; }));
$('#tBgOn').addEventListener('change', onSel((el,ev)=>{ el.bgOn=ev.target.checked; $('#tBgProps').style.display=el.bgOn?'flex':'none'; }));
$('#tBgColor').addEventListener('input', onSel((el,ev)=>{ el.bgColor=ev.target.value; }));
$('#tBorderColor').addEventListener('input', onSel((el,ev)=>{ el.borderColor=ev.target.value; }));
$('#tBorderW').addEventListener('input', onSel((el,ev)=>{ el.borderW=+ev.target.value; $('#tBorderWVal').textContent=el.borderW; }));
$('#tPad').addEventListener('input', onSel((el,ev)=>{ el.pad=+ev.target.value; $('#tPadVal').textContent=el.pad; }));

/* ---------- 레이어 순서/삭제/복제 ---------- */
$('#layerUp').addEventListener('click', ()=>{
  const els = page().elements;
  const i = els.findIndex(e=>e.id===selectedId);
  if(i>=0 && i<els.length-1){ [els[i],els[i+1]]=[els[i+1],els[i]]; renderLayerList(); redraw(); }
});
$('#layerDown').addEventListener('click', ()=>{
  const els = page().elements;
  const i = els.findIndex(e=>e.id===selectedId);
  if(i>0){ [els[i],els[i-1]]=[els[i-1],els[i]]; renderLayerList(); redraw(); }
});
$('#delEl').addEventListener('click', ()=>{
  page().elements = page().elements.filter(e=>e.id!==selectedId);
  selectedId=null; renderAll();
});
$('#dupEl').addEventListener('click', ()=>{
  const el = sel(); if(!el) return;
  const copy = Object.assign({}, el, {id:idSeq++, x:el.x+40, y:el.y+40});
  if(el.crop) copy.crop = Object.assign({}, el.crop);
  page().elements.push(copy); selectedId=copy.id; renderAll();
});

/* ---------- 자르기 ---------- */
const cropModal = $('#cropModal'), cropCanvas = $('#cropCanvas');
const cctx = cropCanvas.getContext('2d');
let cropState = null; // {el, cx,cy,cw,ch, fit, cdpr}
function openCrop(){
  const el = sel(); if(!el || el.type!=='image') return;
  const maxW = Math.min(window.innerWidth*0.9, 900);
  const maxH = window.innerHeight*0.62;
  const fit = Math.min(maxW/el.w, maxH/el.h);
  const c = el.crop || {cx:0, cy:0, cw:el.w, ch:el.h};
  cropState = {el, cx:c.cx, cy:c.cy, cw:c.cw, ch:c.ch, fit, cdpr:dpr};
  cropCanvas.style.width = (el.w*fit)+'px';
  cropCanvas.style.height = (el.h*fit)+'px';
  cropCanvas.width = Math.round(el.w*fit*dpr);
  cropCanvas.height = Math.round(el.h*fit*dpr);
  cropModal.classList.add('show');
  drawCrop();
}
function drawCrop(){
  const st = cropState; if(!st) return;
  const F = st.fit*st.cdpr;
  cctx.clearRect(0,0,cropCanvas.width,cropCanvas.height);
  cctx.drawImage(st.el.img, 0, 0, st.el.w*F, st.el.h*F);
  cctx.fillStyle = 'rgba(10,11,14,.62)';
  cctx.fillRect(0,0,cropCanvas.width,cropCanvas.height);
  cctx.drawImage(st.el.img, st.cx, st.cy, st.cw, st.ch,
                 st.cx*F, st.cy*F, st.cw*F, st.ch*F);
  cctx.strokeStyle = '#E8B33C'; cctx.lineWidth = 2*st.cdpr;
  cctx.strokeRect(st.cx*F, st.cy*F, st.cw*F, st.ch*F);
  [[st.cx,st.cy],[st.cx+st.cw,st.cy],[st.cx,st.cy+st.ch],[st.cx+st.cw,st.cy+st.ch]].forEach(([px,py])=>{
    cctx.beginPath(); cctx.arc(px*F, py*F, 10*st.cdpr, 0, Math.PI*2);
    cctx.fillStyle = '#E8B33C'; cctx.fill();
    cctx.lineWidth = 2.5*st.cdpr; cctx.strokeStyle = '#1A1608'; cctx.stroke();
  });
}
let cropDrag = null;
function cropPos(ev){
  const r = cropCanvas.getBoundingClientRect();
  return { x:(ev.clientX-r.left)/cropState.fit, y:(ev.clientY-r.top)/cropState.fit };
}
cropCanvas.addEventListener('pointerdown', ev=>{
  if(!cropState) return;
  const p = cropPos(ev), st = cropState;
  const grip = 24/st.fit;
  const corners = [
    ['nw', st.cx, st.cy], ['ne', st.cx+st.cw, st.cy],
    ['sw', st.cx, st.cy+st.ch], ['se', st.cx+st.cw, st.cy+st.ch]
  ];
  for(const [k,px,py] of corners){
    if(Math.hypot(p.x-px, p.y-py) < grip){
      cropDrag = {mode:k, sx:p.x, sy:p.y, o:{cx:st.cx,cy:st.cy,cw:st.cw,ch:st.ch}};
      cropCanvas.setPointerCapture(ev.pointerId); ev.preventDefault(); return;
    }
  }
  if(p.x>=st.cx && p.x<=st.cx+st.cw && p.y>=st.cy && p.y<=st.cy+st.ch){
    cropDrag = {mode:'move', sx:p.x, sy:p.y, o:{cx:st.cx,cy:st.cy,cw:st.cw,ch:st.ch}};
    cropCanvas.setPointerCapture(ev.pointerId); ev.preventDefault();
  }
});
cropCanvas.addEventListener('pointermove', ev=>{
  if(!cropDrag || !cropState) return;
  const p = cropPos(ev), st = cropState, o = cropDrag.o;
  const dx = p.x-cropDrag.sx, dy = p.y-cropDrag.sy;
  const MIN = 24;
  if(cropDrag.mode==='move'){
    st.cx = Math.max(0, Math.min(st.el.w-o.cw, o.cx+dx));
    st.cy = Math.max(0, Math.min(st.el.h-o.ch, o.cy+dy));
  }else{
    let x1=o.cx, y1=o.cy, x2=o.cx+o.cw, y2=o.cy+o.ch;
    if(cropDrag.mode.includes('w')) x1 = Math.max(0, Math.min(x2-MIN, o.cx+dx));
    if(cropDrag.mode.includes('e')) x2 = Math.min(st.el.w, Math.max(x1+MIN, o.cx+o.cw+dx));
    if(cropDrag.mode.includes('n')) y1 = Math.max(0, Math.min(y2-MIN, o.cy+dy));
    if(cropDrag.mode.includes('s')) y2 = Math.min(st.el.h, Math.max(y1+MIN, o.cy+o.ch+dy));
    st.cx=x1; st.cy=y1; st.cw=x2-x1; st.ch=y2-y1;
  }
  drawCrop();
});
const endCropDrag = ()=>{ cropDrag=null; };
cropCanvas.addEventListener('pointerup', endCropDrag);
cropCanvas.addEventListener('pointercancel', endCropDrag);
$('#cropBtn').addEventListener('click', openCrop);
$('#cropFull').addEventListener('click', ()=>{
  if(!cropState) return;
  cropState.cx=0; cropState.cy=0; cropState.cw=cropState.el.w; cropState.ch=cropState.el.h;
  drawCrop();
});
$('#cropCancel').addEventListener('click', ()=>{ cropModal.classList.remove('show'); cropState=null; });
$('#cropApply').addEventListener('click', ()=>{
  const st = cropState; if(!st) return;
  const full = st.cx===0 && st.cy===0 && st.cw===st.el.w && st.ch===st.el.h;
  st.el.crop = full ? null : {cx:Math.round(st.cx), cy:Math.round(st.cy), cw:Math.round(st.cw), ch:Math.round(st.ch)};
  cropModal.classList.remove('show'); cropState=null;
  redraw();
});
$('#cropReset').addEventListener('click', onSel(el=>{ el.crop=null; }));

/* ---------- 내보내기 ---------- */
function renderPageToDataURL(pg, s){
  const c = document.createElement('canvas');
  c.width = canvasW*s; c.height = canvasH*s;
  renderScene(c.getContext('2d'), pg, s);
  return c.toDataURL('image/png');
}
function dataURLtoFile(dataURL, fname){
  const bin = atob(dataURL.split(',')[1]);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new File([bytes], fname, {type:'image/png'});
}
$('#exportBtn').addEventListener('click', ()=>{
  try{
    const s = +$('#exportScale').value;
    const range = $('#exportRange').value;
    const targets = range==='all' ? pages : [page()];
    const files = [], urls = [];
    targets.forEach((pg,i)=>{
      const u = renderPageToDataURL(pg, s);
      urls.push(u);
      files.push(dataURLtoFile(u, 'collage_p'+(i+1)+'_'+canvasW*s+'x'+canvasH*s+'.png'));
    });
    if(navigator.canShare && navigator.canShare({files})){
      navigator.share({files})
        .then(()=>toast('공유 시트에서 "이미지 저장"을 누르면 '+files.length+'장이 갤러리에 저장됩니다.'))
        .catch(err=>{ if(err.name!=='AbortError') fallbackExport(urls); });
    }else{
      fallbackExport(urls);
    }
  }catch(e){ toast('내보내기 중 오류: '+e.message+' (배율을 낮춰 다시 시도해 보세요)'); }
});
function fallbackExport(urls){
  urls.forEach((u,i)=>{
    const a = document.createElement('a');
    a.href = u; a.download = 'collage_p'+(i+1)+'.png';
    document.body.appendChild(a); a.click(); a.remove();
  });
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:150;display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px;overflow-y:auto;';
  const tip = document.createElement('p');
  tip.textContent = '이 환경에서는 공유 시트를 열 수 없습니다. 각 이미지를 길게 눌러 저장하거나, 사파리에서 열어 다시 시도하세요.';
  tip.style.cssText = 'color:#E9EAEC;font-size:14px;margin:0;text-align:center;';
  ov.appendChild(tip);
  urls.forEach(u=>{
    const im = document.createElement('img');
    im.src = u;
    im.style.cssText = 'max-width:88%;box-shadow:0 8px 40px rgba(0,0,0,.6);flex:0 0 auto;';
    ov.appendChild(im);
  });
  const close = document.createElement('button');
  close.textContent = '닫기';
  close.addEventListener('click', ()=>ov.remove());
  ov.appendChild(close);
  document.body.appendChild(ov);
}

/* ---------- init ---------- */
renderAll();
})();
</script>
</body>
